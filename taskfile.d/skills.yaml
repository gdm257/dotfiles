version: "3"

tasks:
  install:
    desc: "Install app <REPO>"
    requires:
      vars:
        - REPO
    cmds:
      - openskills install -g -u {{.REPO}}

  skills:install:
    internal: true
    requires:
      vars:
        - REPOS
    cmds:
      - for: { var: REPOS, as: REPO }
        task: install
        vars:
          REPO: "{{.REPO}}"
