version: "3"

tasks:
  install:self:eget:
    dir: "{{.USER_WORKING_DIR}}"
    cmds:
      - eget marcosnils/bin
      - ./bin install github.com/marcosnils/bin
      - rm bin

  install:
    desc: "Install binary <BIN>"
    requires:
      vars:
        - BIN
    cmds:
      - bin install {{.BIN}}
