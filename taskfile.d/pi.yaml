version: "3"

tasks:
  install:
    desc: "Install app <APP>"
    requires:
      vars:
        - APP
    cmds:
      - pi install {{.APP}}

  extension:install:
    internal: true
    requires:
      vars:
        - APPS
    cmds:
      - for: { var: APPS, as: APP }
        task: install
        vars:
          APP: "{{.APP}}"
