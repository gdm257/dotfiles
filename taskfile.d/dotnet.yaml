version: "3"

tasks:
  add:
    desc: "Add source <SOURCE>"
    requires:
      vars:
        - SOURCE
    cmds:
      - dotnet nuget add source {{.SOURCE.URL}} -n {{.SOURCE.NAME}}

  install:
    desc: "Install tool <TOOL> [GLOBAL]"
    requires:
      vars:
        - TOOL
    vars:
      _GLOBAL: "{{if not .GLOBAL}}{{else}}-g{{end}}"
    cmds:
      - dotnet tool install {{._GLOBAL}} {{.TOOL}}
