version: "3"

tasks:
  install:
    platforms: [linux]
    desc: "Install package <PACKAGE>"
    requires:
      vars:
        - PACKAGE
    cmds:
      - yum install -y {{.PACKAGE}}

  install:group:
    platforms: [linux]
    desc: "Group installation <GROUP>"
    requires:
      vars:
        - GROUP
    cmds:
      - yum groupinstall {{.GROUP}}
