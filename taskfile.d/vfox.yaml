version: "3"

tasks:
  add:
    desc: "Add a plugin <PLUGIN>"
    requires:
      vars:
        - PLUGIN
    cmds:
      - vfox add {{.PLUGIN}}

  install:
    desc: "Install a SDK <SDK>"
    requires:
      vars:
        - SDK
    cmds:
      - vfox install {{.SDK}}

  globalize:
    desc: "Set up auto activation for SDK <SDK>"
    requires:
      vars:
        - SDK
    cmds:
      - vfox use --global {{.SDK}}
