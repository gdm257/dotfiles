version: "3"

tasks:
  role:install:
    platforms: [linux, darwin]
    desc: "Install role <ROLE>"
    requries:
      vars:
        - ROLE
    cmds:
      - ansible-galaxy role install {{.ROLE}}

  collection:install:
    platforms: [linux, darwin]
    desc: "Install collection <COLLECTION>"
    requries:
      vars:
        - COLLECTION
    cmds:
      - ansible-galaxy collection install {{.COLLECTION}}
