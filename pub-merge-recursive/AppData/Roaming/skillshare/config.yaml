# yaml-language-server: $schema=https://raw.githubusercontent.com/runkids/skillshare/main/schemas/config.schema.json
source: ~\AppData\Roaming\skillshare\skills
agents_source: ~/AppData/Roaming/skillshare/agents
extras_source: ~/AppData/Roaming/skillshare/extras
targets:
  claude:
    skills:
      mode: copy
    agents:
      mode: copy
  opencode:
    skills:
      exclude:
        - '*'
    agents:
      mode: copy
  universal:
    skills:
      mode: copy
ignore:
  - '**/.DS_Store'
  - '**/.git/**'
audit:
  block_threshold: CRITICAL
